<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشاريع GNUTUX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/10298253?v=4&size=64">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @font-face {
      font-family: 'Noto Sans Arabic';
      src: url('fonts/NotoSansArabic-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Sans Arabic';
      src: url('fonts/NotoSansArabic.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #2d3748;
      --primary-light: #4a5568;
      --secondary: #38b2ac;
      --accent: #9f7aea;
      --bg: #ffffff;
      --text: #222222;
      --text-light: #718096;
      --header-bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: rgba(0, 0, 0, 0.06);
      --shadow-hover: rgba(0, 0, 0, 0.12);
      --transition: all 0.25s ease;
      --radius: 14px;
      --font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .dark {
      --primary: #e2e8f0;
      --primary-light: #cbd5e0;
      --secondary: #81e6d9;
      --accent: #b794f4;
      --bg: #121212;
      --text: #f0f0f0;
      --text-light: #a0aec0;
      --header-bg: #1e1e1e;
      --card-bg: #1c1c1c;
      --border: #2d3748;
      --shadow: rgba(0, 0, 0, 0.4);
      --shadow-hover: rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg);
      color: var(--text);
      transition: var(--transition);
      line-height: 1.6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: var(--header-bg);
      box-shadow: 0 4px 15px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background-color: rgba(255,255,255,0.7);
    }

    .dark header {
      background-color: rgba(30,30,30,0.8);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--primary);
    }

    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: var(--transition);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
    }

    .logo img:hover {
      transform: rotate(20deg) scale(1.05);
      box-shadow: 0 0 15px var(--secondary);
    }

    .controls {
      display: flex;
      gap: 0.8rem;
    }

    .control-btn {
      cursor: pointer;
      font-size: 1rem;
      border: none;
      background: var(--card-bg);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 2px 6px var(--shadow);
      border: 1px solid var(--border);
      font-weight: 500;
      font-family: var(--font-family);
    }

    .control-btn:hover {
      background-color: var(--secondary);
      color: white;
      border-color: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px var(--shadow-hover);
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-title {
      text-align: center;
      margin-bottom: 2.8rem;
      color: var(--primary);
      font-size: 2.4rem;
      position: relative;
      padding-bottom: 0.8rem;
      letter-spacing: -0.5px;
      font-weight: 700;
    }

    .page-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      border-radius: 4px;
    }

    .repos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
    }

    .repo {
      padding: 1.8rem 1.5rem;
      border-radius: var(--radius);
      background-color: var(--card-bg);
      box-shadow: 0 6px 14px var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .repo:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px var(--shadow-hover);
      border-color: var(--secondary);
    }

    .repo-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 70px;
      margin-bottom: 1.2rem;
    }

    .repo-logo img {
      max-height: 64px;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.3s;
    }

    .repo-logo img:hover {
      transform: scale(1.1);
    }

    .repo-logo i.fallback-icon {
      font-size: 2.5rem;
      color: var(--text-light);
      opacity: 0.8;
    }

    .repo h3 {
      margin-bottom: 0.7rem;
      font-size: 1.3rem;
      text-align: center;
      font-weight: 700;
    }

    .repo h3 a {
      color: var(--primary);
      text-decoration: none;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .repo h3 a:hover {
      color: var(--secondary);
    }

    .repo h3 a i {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .repo p {
      margin-bottom: 1rem;
      color: var(--text-light);
      flex-grow: 1;
      text-align: center;
      font-weight: 400;
    }

    .repo-meta {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      padding-top: 0.85rem;
      flex-wrap: wrap;
    }

    .repo-meta span {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .toggle-readme {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-family: var(--font-family);
    }

    .toggle-readme:hover {
      background-color: var(--secondary);
      color: white;
      border-color: var(--secondary);
      transform: scale(1.02);
    }

    .readme-content {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: 1.7;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      word-break: break-word;
      text-align: left;
      direction: ltr;
      font-family: var(--font-family);
    }

    .readme-content img {
      max-width: 100%;
      height: auto;
    }

    .readme-content pre {
      background: var(--header-bg);
      padding: 0.8rem;
      border-radius: 6px;
      overflow-x: auto;
    }

    .loading, .error {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-light);
    }

    .loading i, .error i {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: var(--secondary);
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      margin-top: 3rem;
      border-top: 1px solid var(--border);
      color: var(--text-light);
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      header {
        padding: 1rem;
        flex-direction: column;
        gap: 1rem;
        backdrop-filter: blur(10px);
      }

      .container {
        padding: 1.5rem;
      }

      .page-title {
        font-size: 1.9rem;
      }

      .repos-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .controls {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .controls {
        flex-direction: column;
        width: 100%;
      }

      .control-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://avatars.githubusercontent.com/u/10298253?v=4&size=64" alt="GitHub Logo" onclick="window.location.reload();" title="انقر لتحديث الصفحة">
      <span id="site-title">مشاريع GNUTUX</span>
    </div>
    <div class="controls">
      <button id="lang-toggle" class="control-btn">
        <i class="fas fa-language"></i>
        <span>EN</span>
      </button>
      <button id="theme-toggle" class="control-btn">
        <i id="theme-icon" class="fas fa-moon"></i>
        <span id="theme-text">الوضع الليلي</span>
      </button>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title" id="page-title">مشاريع GNUTUX</h1>

    <main id="repos" class="repos-grid"></main>
  </div>

  <footer>
    <p id="footer-text">جميع الحقوق محفوظة © 2026 مشاريع GNUTUX</p>
  </footer>

  <script>
    const reposContainer = document.getElementById('repos');
    const langToggle = document.getElementById('lang-toggle');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');
    const siteTitle = document.getElementById('site-title');
    const pageTitle = document.getElementById('page-title');
    const footerText = document.getElementById('footer-text');

    let currentLang = localStorage.getItem('lang') || 'ar';
    let currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    document.body.classList.toggle('dark', currentTheme === 'dark');
    updateThemeIcon();
    updateTexts();

    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('lang', currentLang);
      updateTexts();
    });

    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      document.body.classList.toggle('dark', currentTheme === 'dark');
      updateThemeIcon();
    });

    function updateThemeIcon() {
      if (currentTheme === 'dark') {
        themeIcon.className = 'fas fa-sun';
        themeText.textContent = currentLang === 'ar' ? 'الوضع النهاري' : 'Light Mode';
      } else {
        themeIcon.className = 'fas fa-moon';
        themeText.textContent = currentLang === 'ar' ? 'الوضع الليلي' : 'Dark Mode';
      }
    }

    function updateTexts() {
      if (currentLang === 'ar') {
        document.documentElement.lang = 'ar';
        document.documentElement.dir = 'rtl';
        langToggle.querySelector('span').textContent = 'EN';
        siteTitle.textContent = 'مشاريع GNUTUX';
        pageTitle.textContent = 'مشاريع GNUTUX';
        footerText.textContent = 'جميع الحقوق محفوظة © 2025 مشاريع GNUTUX';
      } else {
        document.documentElement.lang = 'en';
        document.documentElement.dir = 'ltr';
        langToggle.querySelector('span').textContent = 'عربي';
        siteTitle.textContent = 'GNUTUX Projects';
        pageTitle.textContent = 'GNUTUX Projects';
        footerText.textContent = 'All rights reserved © 2025 GNUTUX Projects';
      }
      fetchRepos();
    }

    async function fetchRepos() {
      const loadingMsg = currentLang === 'ar'
        ? '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>جاري تحميل المشاريع...</p></div>'
        : '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading projects...</p></div>';

      reposContainer.innerHTML = loadingMsg;

      try {
        const response = await fetch('https://api.github.com/users/SalehGNUTUX/repos?per_page=100');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();

        const officialRepos = data.filter(repo => !repo.fork);
        officialRepos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

        reposContainer.innerHTML = '';

        if (officialRepos.length === 0) {
          reposContainer.innerHTML = currentLang === 'ar'
            ? '<div class="error"><i class="fas fa-folder-open"></i><p>لا توجد مشاريع لعرضها</p></div>'
            : '<div class="error"><i class="fas fa-folder-open"></i><p>No projects to display</p></div>';
          return;
        }

        officialRepos.forEach(repo => {
          const card = document.createElement('div');
          card.className = 'repo';

          card.innerHTML = `
            <div class="repo-logo">
              <img src="https://raw.githubusercontent.com/SalehGNUTUX/${repo.name}/main/logo.png"
                   alt="شعار ${repo.name}"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <i class="fas fa-code fallback-icon" style="display:none;"></i>
            </div>
            <h3>
              <a href="${repo.html_url}" target="_blank">
                ${repo.name}
                <i class="fas fa-external-link-alt"></i>
              </a>
            </h3>
            <p>${repo.description || (currentLang === 'ar' ? 'لا يوجد وصف' : 'No description')}</p>
            <div class="repo-meta">
              <span><i class="fas fa-code"></i> ${repo.language || '-'}</span>
              <span><i class="fas fa-clock"></i> ${new Date(repo.updated_at).toLocaleDateString(currentLang)}</span>
            </div>
            <button class="toggle-readme" data-repo="${repo.name}">
              <i class="fas fa-chevron-down"></i>
              <span>${currentLang === 'ar' ? 'عرض المزيد' : 'Show more'}</span>
            </button>
            <div class="readme-content"></div>
          `;
          reposContainer.appendChild(card);
        });

        document.querySelectorAll('.toggle-readme').forEach(button => {
          button.addEventListener('click', toggleReadme);
        });

      } catch (error) {
        console.error('Error fetching repos:', error);
        reposContainer.innerHTML = currentLang === 'ar'
          ? '<div class="error"><i class="fas fa-exclamation-triangle"></i><p>فشل في تحميل المشاريع</p></div>'
          : '<div class="error"><i class="fas fa-exclamation-triangle"></i><p>Failed to load projects</p></div>';
      }
    }

    async function toggleReadme(event) {
      const button = event.currentTarget;
      const repoName = button.dataset.repo;
      const readmeDiv = button.nextElementSibling;
      const icon = button.querySelector('i');
      const spanText = button.querySelector('span');

      const isVisible = readmeDiv.style.display === 'block';

      if (isVisible) {
        readmeDiv.style.display = 'none';
        icon.className = 'fas fa-chevron-down';
        spanText.textContent = currentLang === 'ar' ? 'عرض المزيد' : 'Show more';
        return;
      }

      readmeDiv.style.display = 'block';
      icon.className = 'fas fa-chevron-up';
      spanText.textContent = currentLang === 'ar' ? 'إخفاء' : 'Hide';

      if (readmeDiv.dataset.loaded === 'true') return;

      readmeDiv.innerHTML = currentLang === 'ar'
        ? '<p style="text-align:center"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المعلومات...</p>'
        : '<p style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading README...</p>';

      try {
        const readmeResponse = await fetch(`https://api.github.com/repos/SalehGNUTUX/${repoName}/readme`);
        if (!readmeResponse.ok) {
          throw new Error('README not found');
        }
        const readmeData = await readmeResponse.json();

        // تحويل base64 إلى مصفوفة بايتات ثم إلى نص UTF-8
        const binaryString = atob(readmeData.content);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const rawContent = new TextDecoder('utf-8').decode(bytes);

        const htmlContent = marked.parse(rawContent);
        readmeDiv.innerHTML = htmlContent;
        readmeDiv.dataset.loaded = 'true';
      } catch (error) {
        console.error(`Failed to load README for ${repoName}:`, error);
        readmeDiv.innerHTML = currentLang === 'ar'
          ? '<p style="text-align:center; opacity:0.7">⚠️ لا يتوفر ملف توضيحي لهذا المشروع</p>'
          : '<p style="text-align:center; opacity:0.7">⚠️ No README available for this project.</p>';
        readmeDiv.dataset.loaded = 'true';
      }
    }

    fetchRepos();
  </script>
</body>
</html>
